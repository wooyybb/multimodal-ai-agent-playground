services:
  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./outputs:/app/outputs
      - ./memory:/app/memory
      - ./benchmark:/app/benchmark

  gradio:
    build: .
    command: python main.py
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
    volumes:
      - ./outputs:/app/outputs
      - ./memory:/app/memory
      - ./benchmark:/app/benchmark
